<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Login Page</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    background:rgba(255,255,255,.15);
    border-radius:50%;
    top:-120px;
    left:-100px;
}

body::after{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    background:rgba(255,255,255,.12);
    border-radius:50%;
    bottom:-120px;
    right:-100px;
}

.login-box{
    width:380px;
    padding:40px;
    border-radius:20px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    box-shadow:0 8px 30px rgba(0,0,0,.3);
    text-align:center;
    color:white;
    animation:fadeIn 1s ease;
}

.login-box h2{
    font-size:34px;
    margin-bottom:10px;
}

.login-box p{
    margin-bottom:25px;
}

.input-box{
    display:flex;
    align-items:center;
    background:rgba(255,255,255,.2);
    border-radius:10px;
    padding:12px;
    margin:15px 0;
}

.input-box i{
    margin-right:10px;
}

.input-box input{
    width:100%;
    border:none;
    outline:none;
    background:transparent;
    color:white;
    font-size:16px;
}

.input-box input::placeholder{
    color:#f1f1f1;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:white;
    color:#2575fc;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
    background:#eeeeee;
}

.links{
    display:flex;
    justify-content:space-between;
    margin-top:18px;
}

.links a{
    color:white;
    text-decoration:none;
    font-size:14px;
}

.links a:hover{
    text-decoration:underline;
}

#message{
    margin-top:15px;
    font-weight:bold;
    font-size:16px;
}

.footer{
    margin-top:25px;
    font-size:13px;
    opacity:.9;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(-30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>
<body>

<div class="login-box">

<h2><i class="fa-solid fa-cloud"></i> Login page of hosting website</h2>
<p>Welcome! Sign in to continue</p>

<form id="loginForm">

<div class="input-box">
<i class="fa-solid fa-user"></i>
<input type="text" id="username" placeholder="Username" required>
</div>

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" id="password" placeholder="Password" required>
</div>

<button type="submit">
<i class="fa-solid fa-right-to-bracket"></i> Login
</button>

<p id="message"></p>

<div class="links">
<a href="#">Forgot Password?</a>
<a href="#">Create Account</a>
</div>

<div class="footer">
Made with ❤️ for Cloud Infrastructure Lab
</div>

</form>

</div>

<script>
document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;
let msg=document.getElementById("message");

if(user==="admin" && pass==="1234"){
msg.style.color="#7CFC00";
msg.innerHTML="✅ Login Successful! Welcome "+user;
}
else{
msg.style.color="#FFD700";
msg.innerHTML="❌ Invalid Username or Password";
}

});
</script>

</body>
</html>
